mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
external-controller: 127.0.0.1:9090
secret: replace-with-your-controller-secret

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

proxies:
  - name: sg-example
    type: ss
    server: 1.2.3.4
    port: 443
    cipher: aes-256-gcm
    password: replace-with-password

proxy-groups:
  - name: 选择节点
    type: select
    proxies:
      - sg-example

rules:
  - MATCH,选择节点
